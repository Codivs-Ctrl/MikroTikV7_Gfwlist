name: MikroTikV7_Gfwlist_Scripts

on:
  workflow_dispatch:
  schedule:
    - cron: '20 20 * * 3' # 每周三 20:20 UTC

permissions:
  contents: write

concurrency:
  group: mikrotikv7-gfwlist-update
  cancel-in-progress: true

jobs:
  update-gfwlist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install tldextract

      - name: Run script to update gfwlist domains
        run: python MikroTikV7_Gfwlist.py

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push changes
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          git add gfwlist_sld.txt gfwlist7_domain.rsc

          # 没有变更就退出（避免空提交）
          git diff --staged --quiet && exit 0

          git commit -m "Auto update GFWList domains [skip ci]"

          # 先同步远端，避免 non-fast-forward
          git pull --rebase origin "${GITHUB_REF_NAME}"

          # 推回当前分支（main/master）
          git push origin HEAD:"${GITHUB_REF_NAME}"
